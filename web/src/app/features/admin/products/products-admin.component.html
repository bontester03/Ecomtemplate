<div class="d-sm-flex align-items-center justify-content-between mb-4">
  <div>
    <h1 class="mb-1">Products</h1>
    <p class="text-muted mb-0">Manage categories, products, variants, and add-ons.</p>
  </div>
  <button class="btn btn-primary mt-3 mt-sm-0" type="button" (click)="create()">
    <i class="bi bi-plus-circle me-1"></i>
    Create Product
  </button>
</div>

<div class="card mb-4">
  <div class="card-header d-flex align-items-center">
    <i class="bi bi-box-seam me-2"></i>
    Product List
  </div>
  <div class="card-body border-bottom">
    <div class="row g-3 align-items-center">
      <div class="col-12 col-md-4 d-flex align-items-center gap-2">
        <select class="form-select w-auto" [(ngModel)]="pageSize" aria-label="Entries per page">
          <option [ngValue]="10">10</option>
          <option [ngValue]="25">25</option>
          <option [ngValue]="50">50</option>
        </select>
        <span class="text-muted">entries per page</span>
      </div>
      <div class="col-12 col-md-4 ms-md-auto">
        <input class="form-control" [(ngModel)]="searchTerm" placeholder="Search..." aria-label="Search products" />
      </div>
    </div>
  </div>
  <div class="card-body p-0">
    <div class="table-responsive">
      <table class="table table-hover align-middle mb-0">
        <thead>
          <tr>
            <th class="ps-4">Name</th>
            <th>Category</th>
            <th>Status</th>
            <th class="text-end pe-4">Actions</th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let product of filteredProducts">
            <td class="ps-4 fw-semibold">{{ product.name }}</td>
            <td>{{ product.category }}</td>
            <td>
              <span class="badge" [class.bg-success-soft]="product.isActive" [class.text-success]="product.isActive" [class.bg-danger-soft]="!product.isActive" [class.text-danger]="!product.isActive">
                {{ product.isActive ? 'Active' : 'Inactive' }}
              </span>
            </td>
            <td class="text-end pe-4">
              <div class="btn-group btn-group-sm" role="group" aria-label="Product actions">
                <button class="btn btn-outline-primary" type="button" (click)="configure(product)">Configure</button>
                <button class="btn btn-outline-secondary" type="button" (click)="edit(product)">Edit</button>
                <button class="btn btn-outline-danger" type="button" (click)="remove(product)">Delete</button>
              </div>
            </td>
          </tr>

          <tr *ngIf="!filteredProducts.length">
            <td class="ps-4 text-muted" colspan="4">No products found.</td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</div>
