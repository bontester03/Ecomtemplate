<section class="reviews-strip py-4" aria-label="Customer reviews">
  <div class="container">
    <div class="row g-3 align-items-stretch">
      <div class="col-12 col-lg-3">
        <article class="trust-box h-100">
          <h2>Excellent</h2>
          <app-rating-stars [rating]="5" sizeClass="lg"></app-rating-stars>
          <p class="mb-1">Based on 11,684 reviews</p>
          <p class="trustpilot-mark mb-0"><i class="bi bi-star-fill"></i> Trustpilot</p>
        </article>
      </div>

      <div class="col-12 col-lg-9">
        <div class="row g-3">
          <div class="col-12 col-md-4" *ngFor="let review of reviews">
            <article class="review-card h-100">
              <app-rating-stars [rating]="review.rating"></app-rating-stars>
              <h3>{{ review.title }}</h3>
              <p>{{ review.message }}</p>
              <small>{{ review.reviewer }} · {{ review.date }}</small>
            </article>
          </div>
        </div>
      </div>
    </div>
  </div>
</section>
