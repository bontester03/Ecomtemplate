<aside class="sidebar-filters" aria-label="Product filters">
  <h2 class="sidebar-title">Shop Menu</h2>

  <nav class="quick-links mb-3" aria-label="Quick shop links">
    <a routerLink="/category/our-complete-range">Shops All</a>
    <a routerLink="/category/our-complete-range">What's New</a>
  </nav>

  <div class="accordion" id="filterAccordion">
    <div class="accordion-item">
      <h3 class="accordion-header">
        <button class="accordion-button" type="button" data-bs-toggle="collapse" data-bs-target="#priceCollapse" aria-expanded="true">Shop by Price</button>
      </h3>
      <div id="priceCollapse" class="accordion-collapse collapse show" data-bs-parent="#filterAccordion">
        <div class="accordion-body"><a href="#">Under 150 AED</a><a href="#">150 - 250 AED</a><a href="#">Above 250 AED</a></div>
      </div>
    </div>

    <div class="accordion-item">
      <h3 class="accordion-header">
        <button class="accordion-button collapsed" type="button" data-bs-toggle="collapse" data-bs-target="#occasionCollapse" aria-expanded="false">Shop By Occasion</button>
      </h3>
      <div id="occasionCollapse" class="accordion-collapse collapse" data-bs-parent="#filterAccordion">
        <div class="accordion-body">
          <a *ngFor="let c of featuredCategories" [routerLink]="['/category', c.slug]">{{ c.name }}</a>
        </div>
      </div>
    </div>

    <div class="accordion-item">
      <h3 class="accordion-header">
        <button class="accordion-button collapsed" type="button" data-bs-toggle="collapse" data-bs-target="#flowerCollapse" aria-expanded="false">Shop By Flowers</button>
      </h3>
      <div id="flowerCollapse" class="accordion-collapse collapse" data-bs-parent="#filterAccordion">
        <div class="accordion-body">
          <a *ngFor="let c of allCategories" [routerLink]="['/category', c.slug]">{{ c.name }}</a>
        </div>
      </div>
    </div>
  </div>

  <nav class="quick-links mt-3" aria-label="Popular menus">
    <a *ngFor="let c of featuredCategories" [routerLink]="['/category', c.slug]">{{ c.name }}</a>
  </nav>
</aside>
