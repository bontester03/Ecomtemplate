<footer class="mega-footer mt-5" aria-label="Footer">
  <div class="container py-4 py-lg-5">
    <div class="row g-4">
      <section class="col-12 col-lg-3">
        <a routerLink="/home" class="footer-logo" aria-label="Khan Home Floral Line home">
          <img src="assets/images/hero-floral.svg" alt="Khan Home Floral Line logo" />
          <span>Khan Home Floral Line</span>
        </a>
        <address class="mt-3 mb-2">Shop 12, Al Wasl Road, Dubai, UAE</address>
        <p class="mb-1"><a href="tel:+971500000000">+971 50 000 0000</a></p>
        <p class="mb-3"><a href="mailto:hello@khanhomefloral.ae">hello&#64;khanhomefloral.ae</a></p>
        <div class="social-row" aria-label="Social links">
          <a href="#" aria-label="Instagram"><i class="bi bi-instagram"></i></a>
          <a href="#" aria-label="Facebook"><i class="bi bi-facebook"></i></a>
          <a href="#" aria-label="WhatsApp"><i class="bi bi-whatsapp"></i></a>
        </div>
      </section>

      <section class="col-6 col-md-4 col-lg-3" *ngFor="let column of columns">
        <h2>{{ column.title }}</h2>
        <ul>
          <li *ngFor="let link of column.links"><a href="#">{{ link }}</a></li>
        </ul>
      </section>
    </div>
  </div>

  <div class="bottom-bar py-3">
    <div class="container d-flex flex-column flex-md-row justify-content-between align-items-center gap-2">
      <p class="mb-0">Copyright © 2026 Khan Home Floral Line. All Rights Reserved.</p>
      <div class="payment-icons" aria-label="Payment methods">
        <i class="bi bi-credit-card"></i>
        <i class="bi bi-paypal"></i>
        <i class="bi bi-wallet2"></i>
      </div>
    </div>
  </div>
</footer>
