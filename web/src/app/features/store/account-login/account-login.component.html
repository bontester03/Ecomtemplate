<section class="auth-page py-5">
  <div class="container">
    <div class="auth-wrap">
      <aside class="auth-brand">
        <img src="assets/images/hero-floral.svg" alt="Khan Home Floral Line" />
        <h2>Khan Home Floral Line</h2>
        <p>Sign in to view your orders, track deliveries, and checkout faster.</p>
      </aside>

      <mat-card class="account-card">
        <h1>Sign In</h1>
        <p class="muted">Welcome back. Enter your details to continue.</p>

        <mat-form-field appearance="fill">
          <mat-label>Email</mat-label>
          <input matInput [(ngModel)]="email" type="email" autocomplete="email" />
        </mat-form-field>

        <mat-form-field appearance="fill">
          <mat-label>Password</mat-label>
          <input matInput [(ngModel)]="password" type="password" autocomplete="current-password" />
        </mat-form-field>

        <p *ngIf="error" class="error">{{ error }}</p>

        <button mat-raised-button color="primary" class="action-btn" (click)="submit()">Sign In</button>

        <p class="muted foot-note">New customer? <a routerLink="/account/register">Create an account</a></p>
      </mat-card>
    </div>
  </div>
</section>
